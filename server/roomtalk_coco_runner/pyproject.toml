[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "message-system-coco-runner"
version = "0.1.0"
description = "Message System JSONL adapter for the Coco coding assistant"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
message-system-coco-runner = "message-system_coco_runner.runner:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["message-system_coco_runner*"]
