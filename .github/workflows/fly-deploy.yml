name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Test server
        working-directory: server
        run: npm test

      - name: Install client dependencies
        working-directory: client-heroui
        run: npm ci

      - name: Check client translations
        working-directory: client-heroui
        run: npm run translate:i18n:dry

      - name: Build client
        working-directory: client-heroui
        run: npm run build

      - name: Test client
        working-directory: client-heroui
        run: npm test
