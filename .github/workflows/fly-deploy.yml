name: CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.18.0

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Install client dependencies
        working-directory: client-heroui
        run: npm ci

      - name: Check client translations
        working-directory: client-heroui
        run: npm run translate:i18n:dry

      - name: Build client
        working-directory: client-heroui
        run: npm run build

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly runtime secrets
        run: |
          secrets_json="$(flyctl secrets list -a message-system --json)"

          require_secret() {
            local secret_name="$1"
            echo "$secrets_json" | grep -q "\"name\": \"$secret_name\"" || {
              echo "::error::Fly secret $secret_name is missing. Set it before deploying image object storage support."
              exit 1
            }
          }

          require_any_secret() {
            local description="$1"
            shift
            for secret_name in "$@"; do
              if echo "$secrets_json" | grep -q "\"name\": \"$secret_name\""; then
                return 0
              fi
            done

            echo "::error::Fly secret for $description is missing. Expected one of: $*"
            exit 1
          }

          require_secret OPENROUTER_API_KEY
          require_secret DEEPSEEK_API_KEY
          require_secret AWS_ACCESS_KEY_ID
          require_secret AWS_SECRET_ACCESS_KEY
          require_secret GOOGLE_CLIENT_ID
          require_any_secret client-url CLIENT_URL CLIENT_URLS
          require_any_secret media-bucket MEDIA_BUCKET_NAME BUCKET_NAME S3_BUCKET AWS_BUCKET_NAME
          require_any_secret media-storage-endpoint MEDIA_STORAGE_ENDPOINT AWS_ENDPOINT_URL_S3 S3_ENDPOINT
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly
        run: flyctl deploy --remote-only -a message-system
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
