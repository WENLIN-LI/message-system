name: CI/CD

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  build_gate:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Check latest successful build
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_successful_sha="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/fly-deploy.yml/runs?branch=master&status=success&per_page=1" \
              --jq '.workflow_runs[0].head_sha // ""' \
              2>/dev/null || true
          )"

          if [[ -z "$latest_successful_sha" || "$latest_successful_sha" != "$GITHUB_SHA" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes since the latest successful build ($GITHUB_SHA)."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build and Deploy
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.18.0

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Install client dependencies
        working-directory: client-heroui
        run: npm ci

      - name: Check client translations
        working-directory: client-heroui
        run: npm run translate:i18n:dry

      - name: Build client
        working-directory: client-heroui
        run: npm run build

      - name: Setup Fly
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fly runtime secrets
        run: |
          secrets_json="$(flyctl secrets list -a message-system --json)"

          require_secret() {
            local secret_name="$1"
            echo "$secrets_json" | grep -q "\"name\": \"$secret_name\"" || {
              echo "::error::Fly secret $secret_name is missing. Set it before deploying image object storage support."
              exit 1
            }
          }

          require_any_secret() {
            local description="$1"
            shift
            for secret_name in "$@"; do
              if echo "$secrets_json" | grep -q "\"name\": \"$secret_name\""; then
                return 0
              fi
            done

            echo "::error::Fly secret for $description is missing. Expected one of: $*"
            exit 1
          }

          require_secret OPENROUTER_API_KEY
          require_secret DEEPSEEK_API_KEY
          require_secret AWS_ACCESS_KEY_ID
          require_secret AWS_SECRET_ACCESS_KEY
          require_secret GOOGLE_CLIENT_ID
          require_any_secret client-url CLIENT_URL CLIENT_URLS
          require_any_secret media-bucket MEDIA_BUCKET_NAME BUCKET_NAME S3_BUCKET AWS_BUCKET_NAME
          require_any_secret media-storage-endpoint MEDIA_STORAGE_ENDPOINT AWS_ENDPOINT_URL_S3 S3_ENDPOINT
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly
        run: flyctl deploy --remote-only -a message-system
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
